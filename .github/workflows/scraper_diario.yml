name: RFBOT – Scraper Diario

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4 pandas

      - name: Scraping multi-local
        run: python rf.py

      - name: Analizar precios
        run: python analizar_precios.py

      - name: Generar web
        run: python generar_web.py

      - name: Commit y push
        run: |
          git config user.name  "rfbot"
          git config user.email "bot@rfbot.github.io"
          git add -A
          git diff --cached --quiet || git commit -m "Update $(date +'%Y-%m-%d')"
          git push
